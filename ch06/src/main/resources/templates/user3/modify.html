<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>user3::수정</title>
	</head>
	<body>
		<h3>User3 수정</h3>
		<a th:href="@{/}">메인</a>
		<a th:href="@{/user3/list}">목록</a>
		
		<form th:action="@{/user3/modify}" method="post">
			<table border="1">
				<tr>
					<td>아이디</td>
					<td><input type="text" name="userid" th:value="${dto.userid}" readonly="readonly"></td>
				</tr>
				<tr>
					<td>이름</td>
					<td><input type="text" name="name" th:value="${dto.name}"></td>
				</tr>
				<tr>
					<td>생일</td>
					<td><input type="date" name="birth" th:value="${dto.birth.replace('.', '-')}"></td>
				</tr>
				<tr>
					<td>휴대폰</td>
					<td><input type="text" name="hp" th:value="${dto.hp}"></td>
				</tr>
                <tr>
					<td>주소</td>
					<td><input type="text" name="addr" th:value="${dto.addr}"></td>
				</tr>
				<tr>
					<td colspan="2" align="right">
						<input type="submit" value="수정하기">
					</td>
				</tr>
			</table>
		</form>
	</body>
</html>

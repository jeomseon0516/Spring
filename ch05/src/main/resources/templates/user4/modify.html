<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>user4::수정</title>
	</head>
	<body>
		<h3>User4 수정</h3>
		<a th:href="@{/}">메인</a>
		<a th:href="@{/user4/list}">목록</a>
		
		<form th:action="@{/user4/modify}" method="post">
			<table border="1">
				<tr>
					<td>아이디</td>
					<td><input type="text" name="userid" th:value="${dto.userid}" readonly="readonly"></td>
				</tr>
				<tr>
					<td>이름</td>
					<td><input type="text" name="name" th:value="${dto.name}"></td>
				</tr>
				<tr>
					<td>성별</td>
                    <td>
                        <label><input type="radio" name="gender" value="M" th:checked="${'M'.equals(dto.gender)}">남</label>
                        <label><input type="radio" name="gender" value="F" th:checked="${'F'.equals(dto.gender)}">여</label>
                    </td>
				</tr>
                <tr>
                    <td>나이</td>
                    <td><input type="number" name="age" th:value="${dto.age}"></td>
                </tr>
				<tr>
					<td>휴대폰</td>
					<td><input type="text" name="hp" th:value="${dto.hp}"></td>
				</tr>
                <tr>
					<td>주소</td>
					<td><input type="text" name="addr" th:value="${dto.addr}"></td>
				</tr>
				<tr>
					<td colspan="2" align="right">
						<input type="submit" value="수정하기">
					</td>
				</tr>
			</table>
		</form>
	</body>
</html>
